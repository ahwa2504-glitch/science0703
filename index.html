<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>과학 프로젝트</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'맑은 고딕',sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    /* 배경사진 */
    background-image:url("background.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,20,60,0.45);
}

.box{
    position:relative;
    z-index:1;
    width:700px;
    padding:40px;
    text-align:center;

    background:rgba(0,0,50,0.45);
    border:2px solid #00ffff;
    border-radius:20px;
    box-shadow:0 0 25px cyan;
}

h1{
    color:#00ffff;
    font-size:48px;
    text-shadow:0 0 15px cyan;
}

.line{
    width:100%;
    height:2px;
    background:#00ffff;
    margin:20px 0;
}

.info{
    color:white;
    font-size:28px;
    line-height:60px;
}

.footer{
    color:#8efcff;
    margin-top:30px;
    letter-spacing:4px;
}

.circle{
    position:absolute;
    border:2px solid rgba(0,255,255,.5);
    border-radius:50%;
    animation:spin 10s linear infinite;
}

.c1{
    width:180px;
    height:180px;
    top:-90px;
    right:-90px;
}

.c2{
    width:120px;
    height:120px;
    bottom:-60px;
    left:-60px;
    animation-duration:6s;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="box">

<div class="circle c1"></div>
<div class="circle c2"></div>

<h1>🔬 SCIENCE PROFILE 🔬</h1>

<div class="line"></div>

<div class="info">
    <p>🏫 학교 : <strong>아화증학교</strong></p>
    <p>👤 이름 : <strong>박제민</strong></p>
    <p>🧪 주제 : 미래 과학 연구</p>
</div>

<div class="line"></div>

<div class="footer">
SCIENCE • TECHNOLOGY • FUTURE
</div>

</div>

</body>
</html>
