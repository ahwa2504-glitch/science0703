<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아화중학교 2-1 박제민</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    background:radial-gradient(circle at center,#001133,#000814,#000000);
    font-family:'맑은 고딕',sans-serif;
}

/* 제목 */
.title{
    position:absolute;
    width:100%;
    top:40px;
    text-align:center;
    color:white;
    font-size:42px;
    font-weight:bold;
    text-shadow:0 0 10px cyan,0 0 20px blue;
    z-index:10;
}

/* 별 */
.star{
    position:absolute;
    color:white;
    animation:twinkle linear infinite;
    opacity:0.8;
}

@keyframes twinkle{
    0%{
        transform:translateY(0px) scale(0.8);
        opacity:0.3;
    }
    50%{
        opacity:1;
        transform:translateY(-20px) scale(1.2);
    }
    100%{
        transform:translateY(0px) scale(0.8);
        opacity:0.3;
    }
}

/* 지구 */
.earth{
    position:absolute;
    left:80px;
    bottom:120px;
    font-size:90px;
}

/* 달 */
.moon{
    position:absolute;
    right:80px;
    top:120px;
    font-size:70px;
}

/* 우주선 */
.rocket{
    position:absolute;
    left:120px;
    bottom:150px;
    font-size:55px;
    animation:fly 8s linear infinite;
}

@keyframes fly{
    0%{
        left:120px;
        bottom:150px;
        transform:rotate(-20deg);
    }
    50%{
        transform:rotate(-5deg);
    }
    100%{
        left:calc(100% - 180px);
        bottom:calc(100% - 170px);
        transform:rotate(20deg);
    }
}
</style>
</head>

<body>

<div class="title">
아화중학교 2-1 박제민
</div>

<div class="earth">🌍</div>
<div class="moon">🌕</div>
<div class="rocket">🚀</div>

<script>
// 별 120개 생성
for(let i=0;i<120;i++){

    const star=document.createElement("div");
    star.className="star";
    star.innerHTML=Math.random()>0.5?"✦":"✧";

    star.style.left=Math.random()*100+"vw";
    star.style.top=Math.random()*100+"vh";
    star.style.fontSize=(Math.random()*12+8)+"px";
    star.style.animationDuration=(Math.random()*4+2)+"s";
    star.style.animationDelay=(Math.random()*3)+"s";

    document.body.appendChild(star);
}
</script>

</body>
</html>
