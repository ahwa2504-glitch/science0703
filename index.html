<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아화중학교 2-1 박제민 | 과학 학습실</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a1128;
    --bg-deep: #060a1a;
    --panel: #101c3d;
    --panel-2: #14234a;
    --line: rgba(94,231,255,0.16);
    --cyan: #5ee7ff;
    --amber: #ffb703;
    --coral: #ff6b6b;
    --text: #eaf2ff;
    --text-dim: #8ea0c9;
    --text-faint: #56628c;
    --radius: 14px;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  html, body{
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: "Noto Sans KR", sans-serif;
    overflow-x: hidden;
  }

  ::selection{ background: var(--cyan); color: var(--bg-deep); }

  a{ color: inherit; text-decoration: none; }

  /* ---------- starfield / particle canvas ---------- */
  #field{
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse 90% 70% at 50% -10%, rgba(94,231,255,0.10), transparent 60%),
      radial-gradient(ellipse 60% 40% at 100% 100%, rgba(255,183,3,0.06), transparent 60%),
      var(--bg-deep);
  }

  /* ---------- shell layout ---------- */
  .shell{
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 268px 1fr;
    min-height: 100vh;
  }

  /* ---------- sidebar ---------- */
  .sidebar{
    background: linear-gradient(180deg, var(--panel), var(--bg-deep) 90%);
    border-right: 1px solid var(--line);
    padding: 28px 18px 24px;
    display: flex;
    flex-direction: column;
    gap: 22px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .brand{
    padding: 6px 8px 16px;
    border-bottom: 1px dashed var(--line);
  }

  .brand .school{
    font-family: "Space Grotesk", sans-serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--cyan);
    text-transform: uppercase;
  }

  .brand .who{
    margin-top: 6px;
    font-weight: 900;
    font-size: 19px;
    letter-spacing: -0.02em;
  }

  .brand .who .accent{ color: var(--amber); }

  .brand .tag{
    margin-top: 8px;
    font-size: 11.5px;
    color: var(--text-faint);
    line-height: 1.5;
  }

  .nav-label{
    font-family: "Space Grotesk", sans-serif;
    font-size: 10.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-faint);
    padding: 0 8px;
  }

  .units{
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .unit{
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 10px;
    border-radius: 10px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: background 0.18s ease, border-color 0.18s ease, transform 0.15s ease;
    position: relative;
  }

  .unit:hover{
    background: rgba(94,231,255,0.06);
    border-color: var(--line);
    transform: translateX(2px);
  }

  .unit.active{
    background: rgba(94,231,255,0.10);
    border-color: rgba(94,231,255,0.35);
  }

  .unit .num{
    font-family: "Space Grotesk", sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-faint);
    width: 22px;
    flex-shrink: 0;
  }

  .unit.active .num{ color: var(--amber); }

  .unit .icon{
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    color: var(--text-dim);
  }

  .unit.active .icon{ color: var(--cyan); }

  .unit .label{
    font-size: 13.5px;
    color: var(--text-dim);
    line-height: 1.3;
  }

  .unit.active .label{ color: var(--text); font-weight: 500; }

  .unit .ext{
    margin-left: auto;
    font-size: 10px;
    color: var(--text-faint);
    opacity: 0;
    transition: opacity 0.18s ease;
  }
  .unit:hover .ext{ opacity: 1; }

  .sidebar-foot{
    margin-top: auto;
    padding: 12px 8px 0;
    border-top: 1px dashed var(--line);
    font-size: 10.5px;
    color: var(--text-faint);
    line-height: 1.6;
  }

  /* ---------- main ---------- */
  main{
    position: relative;
    padding: 56px 64px 80px;
    max-width: 980px;
  }

  .eyebrow{
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: "Space Grotesk", sans-serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--cyan);
    padding: 5px 12px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(94,231,255,0.05);
  }

  .eyebrow .dot{
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--amber);
    box-shadow: 0 0 8px var(--amber);
  }

  h1.hero-title{
    margin-top: 22px;
    font-size: 44px;
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1.15;
  }

  h1.hero-title .em{ color: var(--cyan); }

  .hero-desc{
    margin-top: 16px;
    max-width: 560px;
    color: var(--text-dim);
    font-size: 15px;
    line-height: 1.7;
  }

  /* orbit signature graphic */
  .orbit-wrap{
    position: absolute;
    top: 30px;
    right: 40px;
    width: 210px;
    height: 210px;
    pointer-events: none;
  }
  .orbit-wrap svg{ width: 100%; height: 100%; overflow: visible; }
  .orbit-ring{
    fill: none;
    stroke: var(--line);
    stroke-width: 1;
  }
  .orbit-ring.r2{ stroke: rgba(255,183,3,0.14); }
  .electron{
    transform-origin: 105px 105px;
  }
  .electron circle{
    fill: var(--cyan);
    filter: drop-shadow(0 0 6px var(--cyan));
  }
  .electron.e2{ transform-origin: 105px 105px; }
  .electron.e2 circle{ fill: var(--amber); filter: drop-shadow(0 0 6px var(--amber)); }
  .nucleus{ fill: var(--coral); filter: drop-shadow(0 0 10px rgba(255,107,107,0.6)); }

  @keyframes spin1{ from{ transform: rotate(0deg);} to{ transform: rotate(360deg);} }
  @keyframes spin2{ from{ transform: rotate(360deg);} to{ transform: rotate(0deg);} }
  .electron.e1{ animation: spin1 7s linear infinite; }
  .electron.e2{ animation: spin2 11s linear infinite; }

  /* content panel */
  .panel{
    margin-top: 44px;
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 32px 34px;
    min-height: 260px;
  }

  .panel-head{
    display: flex;
    align-items: center;
    gap: 14px;
    padding-bottom: 18px;
    border-bottom: 1px dashed var(--line);
  }

  .panel-head .icon-badge{
    width: 44px; height: 44px;
    border-radius: 10px;
    background: rgba(94,231,255,0.08);
    border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    color: var(--cyan);
    flex-shrink: 0;
  }
  .panel-head .icon-badge svg{ width: 24px; height: 24px; }

  .panel-head .titles .kicker{
    font-family: "Space Grotesk", sans-serif;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--text-faint);
    text-transform: uppercase;
  }
  .panel-head .titles h2{
    font-size: 22px;
    font-weight: 700;
    margin-top: 3px;
  }

  .panel-body{
    margin-top: 20px;
    color: var(--text-dim);
    font-size: 14.5px;
    line-height: 1.85;
  }

  .panel-body .note{
    margin-top: 18px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12.5px;
    color: var(--amber);
    background: rgba(255,183,3,0.08);
    border: 1px solid rgba(255,183,3,0.25);
    padding: 8px 14px;
    border-radius: 8px;
  }

  .go-btn{
    margin-top: 22px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--cyan);
    color: var(--bg-deep);
    font-weight: 700;
    font-size: 13.5px;
    padding: 11px 20px;
    border-radius: 9px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 0 0 rgba(94,231,255,0);
  }
  .go-btn:hover{
    transform: translateY(-2px);
    box-shadow: 0 8px 22px rgba(94,231,255,0.25);
  }

  footer.page-foot{
    margin-top: 40px;
    color: var(--text-faint);
    font-size: 11.5px;
  }

  @media (prefers-reduced-motion: reduce){
    .electron{ animation: none !important; }
  }

  /* ---------- responsive ---------- */
  @media (max-width: 860px){
    .shell{ grid-template-columns: 1fr; }
    .sidebar{
      position: relative;
      height: auto;
      flex-direction: column;
    }
    main{ padding: 40px 22px 60px; }
    .orbit-wrap{ display: none; }
    h1.hero-title{ font-size: 32px; }
  }
</style>
</head>
<body>

<div id="field"></div>

<div class="shell">

  <!-- ===================== SIDEBAR ===================== -->
  <aside class="sidebar">
    <div class="brand">
      <div class="school">Ahwha Middle School · Science Lab</div>
      <div class="who">아화중학교 2-1 <span class="accent">박제민</span></div>
      <div class="tag">중학교 2학년 과학 학습 자료실입니다.<br>단원을 선택하면 학습 내용으로 이동합니다.</div>
    </div>

    <div>
      <div class="nav-label">Curriculum · 8 Units</div>
      <ul class="units" id="unit-list">
        <!-- JS가 채워 넣습니다 -->
      </ul>
    </div>

    <div class="sidebar-foot">
      과학 2학년 · 2학기 대비<br>
      Last update 2026
    </div>
  </aside>

  <!-- ===================== MAIN ===================== -->
  <main>
    <div class="eyebrow"><span class="dot"></span> Science Class Portal</div>

    <h1 class="hero-title">오늘은 어떤 <span class="em">과학</span>을<br>탐구해볼까요?</h1>
    <p class="hero-desc">
      왼쪽 목록에서 학습할 단원을 클릭하세요. 4단원 <b>물질의 구성</b>을 선택하면
      원소 기호 학습 사이트로 바로 연결됩니다.
    </p>

    <div class="orbit-wrap" aria-hidden="true">
      <svg viewBox="0 0 210 210">
        <ellipse class="orbit-ring r1" cx="105" cy="105" rx="95" ry="40"/>
        <ellipse class="orbit-ring r2" cx="105" cy="105" rx="40" ry="95"/>
        <circle class="nucleus" cx="105" cy="105" r="9"/>
        <g class="electron e1">
          <circle cx="200" cy="105" r="5"/>
        </g>
        <g class="electron e2">
          <circle cx="105" cy="10" r="5"/>
        </g>
      </svg>
    </div>

    <section class="panel" id="panel">
      <!-- JS가 채워 넣습니다 -->
    </section>

    <footer class="page-foot">아화중학교 2-1 박제민 · 과학 학습실</footer>
  </main>

</div>

<script>
  // ---------------------------------------------------------------
  // 단원 데이터
  // ---------------------------------------------------------------
  const units = [
    {
      num: "01",
      name: "물질의 특성",
      desc: "밀도, 용해도, 끓는점, 녹는점 등 물질을 구별하는 고유한 성질을 배웁니다. 순물질과 혼합물을 구분하고, 실험을 통해 물질의 특성을 측정하는 방법을 익힙니다.",
      icon: "flask",
      link: null
    },
    {
      num: "02",
      name: "지권의 변화",
      desc: "지구 내부 구조와 대륙 이동, 판 구조론을 학습합니다. 지진과 화산이 발생하는 원인, 그리고 암석의 순환 과정을 다룹니다.",
      icon: "layers",
      link: null
    },
    {
      num: "03",
      name: "빛과 파동",
      desc: "빛의 직진, 반사, 굴절과 렌즈에 의한 상의 형성을 배웁니다. 더불어 파동의 종류와 소리의 성질까지 함께 탐구합니다.",
      icon: "wave",
      link: null
    },
    {
      num: "04",
      name: "물질의 구성",
      desc: "원소, 원자, 분자의 개념과 원소 기호를 학습합니다. 이 단원을 클릭하면 원소 기호 연습 사이트로 이동합니다.",
      icon: "atom",
      link: "https://sciencej1.cafe24.com/html5/sci2/elementsymbol.html"
    },
    {
      num: "05",
      name: "식물과 에너지",
      desc: "광합성과 증산 작용 등 식물이 에너지를 만들고 사용하는 과정을 배웁니다. 잎의 구조와 물질의 이동 경로도 함께 살펴봅니다.",
      icon: "leaf",
      link: null
    },
    {
      num: "06",
      name: "동물과 에너지",
      desc: "소화, 순환, 호흡, 배설 등 동물의 에너지 대사와 관련된 기관계의 구조와 기능을 학습합니다.",
      icon: "heart",
      link: null
    },
    {
      num: "07",
      name: "전기와 자기",
      desc: "전류, 전압, 저항의 관계와 자기장의 개념을 배웁니다. 전자석과 전동기의 원리까지 폭넓게 다룹니다.",
      icon: "bolt",
      link: null
    },
    {
      num: "08",
      name: "별과 우주",
      desc: "태양계 천체의 특징과 별의 성질, 은하와 우주의 구조를 배웁니다. 우리가 속한 우주의 규모를 가늠해봅니다.",
      icon: "star",
      link: null
    }
  ];

  // ---------------------------------------------------------------
  // 아이콘 (선 스타일 SVG, 24x24 기준)
  // ---------------------------------------------------------------
  const icons = {
    flask: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 3h6M10 3v6l-5.5 9.5A1.5 1.5 0 0 0 5.8 21h12.4a1.5 1.5 0 0 0 1.3-2.5L14 9V3"/><path d="M7.5 15h9"/></svg>',
    layers: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3 3 8l9 5 9-5-9-5Z"/><path d="M3 13l9 5 9-5"/><path d="M3 18l9 5 9-5"/></svg>',
    wave: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 12c2 0 2-4 4-4s2 4 4 4 2-4 4-4 2 4 4 4 2-4 4-4"/></svg>',
    atom: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="1.6" fill="currentColor" stroke="none"/><ellipse cx="12" cy="12" rx="9" ry="3.6"/><ellipse cx="12" cy="12" rx="9" ry="3.6" transform="rotate(60 12 12)"/><ellipse cx="12" cy="12" rx="9" ry="3.6" transform="rotate(120 12 12)"/></svg>',
    leaf: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 19c8 0 14-6 14-14-8 0-14 6-14 14Z"/><path d="M5 19c2-6 5-9 10-12"/></svg>',
    heart: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 20s-7-4.4-9.5-9C1 7.5 2.8 4 6.2 4c2 0 3.3 1.1 4 2.2C10.9 5.1 12.2 4 14.2 4c3.4 0 5.2 3.5 3.7 7-2.5 4.6-9.5 9-9.5 9Z"/></svg>',
    bolt: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z"/></svg>',
    star: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2.5l2.9 6 6.6.8-4.8 4.6 1.2 6.6L12 17.4l-5.9 3.1 1.2-6.6-4.8-4.6 6.6-.8L12 2.5Z"/></svg>'
  };

  const unitListEl = document.getElementById('unit-list');
  const panelEl = document.getElementById('panel');
  let activeIndex = 0; // 처음 화면은 1단원 소개로 시작

  function renderSidebar(){
    unitListEl.innerHTML = units.map((u, i) => `
      <li class="unit ${i === activeIndex ? 'active' : ''}" data-index="${i}" tabindex="0" role="button"
          aria-label="${u.num}단원 ${u.name}">
        <span class="num">${u.num}</span>
        <span class="icon">${icons[u.icon]}</span>
        <span class="label">${u.name}</span>
        ${u.link ? '<span class="ext">↗ 외부</span>' : ''}
      </li>
    `).join('');

    unitListEl.querySelectorAll('.unit').forEach(el => {
      el.addEventListener('click', () => selectUnit(Number(el.dataset.index)));
      el.addEventListener('keydown', (e) => {
        if(e.key === 'Enter' || e.key === ' '){
          e.preventDefault();
          selectUnit(Number(el.dataset.index));
        }
      });
    });
  }

  function renderPanel(){
    const u = units[activeIndex];
    panelEl.innerHTML = `
      <div class="panel-head">
        <div class="icon-badge">${icons[u.icon]}</div>
        <div class="titles">
          <div class="kicker">Unit ${u.num}</div>
          <h2>${u.name}</h2>
        </div>
      </div>
      <div class="panel-body">
        <p>${u.desc}</p>
        ${u.link
          ? `<div class="note">🔗 이 단원은 외부 학습 사이트와 연결되어 있습니다</div><br>
             <a class="go-btn" href="${u.link}" target="_blank" rel="noopener">원소 기호 학습 사이트로 이동 →</a>`
          : `<div class="note">📘 학습 자료 준비 중입니다</div>`
        }
      </div>
    `;
  }

  function selectUnit(i){
    activeIndex = i;
    renderSidebar();
    renderPanel();
    const u = units[i];
    if(u.link){
      window.open(u.link, '_blank', 'noopener');
    }
  }

  renderSidebar();
  renderPanel();

  // ---------------------------------------------------------------
  // 배경 파티클(별) 애니메이션 - 가볍게
  // ---------------------------------------------------------------
  (function starfield(){
    const wrap = document.getElementById('field');
    const canvas = document.createElement('canvas');
    canvas.style.position = 'absolute';
    canvas.style.inset = '0';
    wrap.appendChild(canvas);
    const ctx = canvas.getContext('2d');

    let stars = [];
    function resize(){
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const count = Math.floor((canvas.width * canvas.height) / 14000);
      stars = Array.from({length: count}, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.2 + 0.3,
        a: Math.random() * 0.6 + 0.15,
        s: (Math.random() * 0.4 + 0.1) * (Math.random() < 0.5 ? 1 : -1)
      }));
    }
    resize();
    window.addEventListener('resize', resize);

    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function draw(){
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for(const s of stars){
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(234,242,255,${s.a})`;
        ctx.fill();
        if(!reduce){
          s.a += s.s * 0.01;
          if(s.a < 0.1 || s.a > 0.75) s.s *= -1;
        }
      }
      requestAnimationFrame(draw);
    }
    draw();
  })();
</script>

</body>
</html>
