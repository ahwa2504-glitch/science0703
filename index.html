<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>박제민 과학 페이지</title>

<style>

/* ⭐ 여기 사진 파일 이름만 바꾸세요 */
body{
    background-image:url("background.jpg.png");
}


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{
    height:100vh;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:'맑은 고딕',sans-serif;
}


body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,15,40,0.55);
}


.container{
    position:relative;
    z-index:1;

    width:700px;
    padding:45px;

    text-align:center;
    color:white;

    background:rgba(0,20,60,0.5);

    border:2px solid cyan;
    border-radius:25px;

    box-shadow:0 0 35px cyan;
}


h1{
    font-size:50px;
    color:#00ffff;
    text-shadow:0 0 20px cyan;
}


.line{
    height:2px;
    background:#00ffff;
    margin:25px 0;
}


p{
    font-size:28px;
    line-height:55px;
}


/* START 버튼 */
.start{
    margin-top:35px;

    padding:15px 60px;

    font-size:25px;
    font-weight:bold;

    color:white;
    background:transparent;

    border:2px solid cyan;
    border-radius:50px;

    cursor:pointer;

    box-shadow:0 0 20px cyan;

    transition:0.3s;
}


.start:hover{
    background:#00ffff;
    color:#002040;
    box-shadow:0 0 40px cyan;
    transform:scale(1.1);
}


.footer{
    margin-top:30px;
    color:#8fffff;
    letter-spacing:5px;
}


</style>

</head>


<body>

<div class="container">

<h1>🔬 SCIENCE PROFILE</h1>

<div class="line"></div>

<p>🏫 학교 : <b>아화증학교</b></p>
<p>👤 이름 : <b>박제민</b></p>
<p>🧪 분야 : 미래 과학 연구</p>


<button class="start" onclick="startPage()">
START
</button>


<div class="line"></div>

<div class="footer">
SCIENCE • TECHNOLOGY • FUTURE
</div>

</div>


<script>

function startPage(){
    alert("과학 연구를 시작합니다!");
}

</script>


</body>
</html>
