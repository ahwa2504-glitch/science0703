<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>과학 탐사 미션 | 아화중학교</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gowun+Dodum&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#04060f;
    --deep:#0a0e24;
    --nebula:#6c4fd6;
    --nebula-soft:#8a6ef0;
    --starlight:#ffd76a;
    --earth:#3fa9f5;
    --moon:#d9dbe4;
    --text:#eef1fb;
    --text-dim:#9aa3c4;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{
    height:100%;
    background:var(--void);
    color:var(--text);
    font-family:'Gowun Dodum', sans-serif;
    overflow-x:hidden;
  }

  #stars{
    position:fixed; inset:0; z-index:0; overflow:hidden;
    background:
      radial-gradient(ellipse at 20% 15%, rgba(108,79,214,0.35), transparent 55%),
      radial-gradient(ellipse at 80% 75%, rgba(63,169,245,0.18), transparent 50%),
      linear-gradient(180deg, #04060f 0%, #0a0e24 55%, #100a2b 100%);
  }
  .star{
    position:absolute; border-radius:50%;
    background:#fff;
    box-shadow:0 0 6px 1px rgba(255,255,255,0.7);
    animation:twinkle linear infinite;
  }
  @keyframes twinkle{
    0%,100%{ opacity:.15; transform:scale(.7); }
    50%{ opacity:1; transform:scale(1.15); }
  }
  .shooting-star{
    position:absolute; width:2px; height:2px; background:#fff; border-radius:50%;
    box-shadow:0 0 0 1px rgba(255,255,255,.1);
    animation: shoot 6s linear infinite;
    opacity:0;
  }
  .shooting-star::before{
    content:''; position:absolute; top:0; left:0;
    width:120px; height:1px;
    background:linear-gradient(90deg, rgba(255,255,255,.9), transparent);
    transform:translateX(-120px) rotate(0deg);
  }
  @keyframes shoot{
    0%{ opacity:0; transform:translate(0,0); }
    3%{ opacity:1; }
    18%{ opacity:0; transform:translate(-420px, 260px); }
    100%{ opacity:0; }
  }

  .layout{
    position:relative; z-index:2;
    display:flex; min-height:100vh;
  }

  .mission-nav{
    width:230px; flex-shrink:0;
    background:linear-gradient(180deg, rgba(10,14,36,.85), rgba(4,6,15,.9));
    border-right:1px solid rgba(138,110,240,0.25);
    backdrop-filter:blur(6px);
    padding:28px 0 20px;
    display:flex; flex-direction:column;
  }
  .nav-title{
    font-family:'Orbitron', sans-serif;
    font-size:12px; letter-spacing:.25em;
    color:var(--nebula-soft);
    text-align:center;
    margin-bottom:22px;
  }
  .nav-title span{ display:block; color:var(--text-dim); font-size:10px; margin-top:4px; letter-spacing:.15em; }

  .unit-list{ list-style:none; display:flex; flex-direction:column; }
  .unit-item{
    position:relative;
    display:flex; align-items:center; gap:12px;
    padding:14px 22px;
    cursor:pointer;
    color:var(--text-dim);
    font-size:14.5px;
    transition:color .25s, background .25s;
    border-left:3px solid transparent;
  }
  .unit-item .num{
    font-family:'Orbitron', sans-serif;
    font-size:11px; color:var(--nebula-soft);
    border:1px solid rgba(138,110,240,0.5);
    border-radius:50%;
    width:22px; height:22px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
    transition:all .25s;
  }
  .unit-item:hover{
    color:var(--text);
    background:rgba(138,110,240,0.08);
    border-left-color:var(--nebula-soft);
  }
  .unit-item:hover .num{
    background:var(--nebula-soft);
    color:var(--void);
    box-shadow:0 0 12px rgba(138,110,240,.8);
  }
  .unit-item.active{
    color:var(--text);
    background:rgba(138,110,240,0.14);
    border-left-color:var(--starlight);
  }
  .unit-item.active .num{
    background:var(--starlight);
    border-color:var(--starlight);
    color:var(--void);
    box-shadow:0 0 12px rgba(255,215,106,.8);
  }

  .nav-footer{
    margin-top:auto;
    padding:16px 20px 0;
    font-size:11px;
    color:var(--text-dim);
    text-align:center;
    border-top:1px solid rgba(138,110,240,0.15);
    padding-top:16px;
    letter-spacing:.03em;
    line-height:1.6;
  }
  .nav-footer b{ color:var(--nebula-soft); font-family:'Orbitron',sans-serif; }

  main{
    flex:1;
    position:relative;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:60px 24px 80px;
    text-align:center;
    min-height:100vh;
  }

  .badge{
    font-family:'Orbitron', sans-serif;
    font-size:12px;
    letter-spacing:.2em;
    color:var(--starlight);
    background:rgba(255,215,106,0.08);
    border:1px solid rgba(255,215,106,0.4);
    padding:6px 18px;
    border-radius:999px;
    margin-bottom:26px;
  }

  h1{
    font-family:'Black Han Sans', sans-serif;
    font-size:clamp(32px, 5vw, 56px);
    line-height:1.25;
    letter-spacing:.02em;
    background:linear-gradient(90deg, #fff 20%, #cfd3ff 60%, var(--nebula-soft) 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    margin-bottom:14px;
    text-shadow:0 0 40px rgba(138,110,240,.25);
  }

  .sub{
    color:var(--text-dim);
    font-size:15px;
    margin-bottom:56px;
    letter-spacing:.02em;
  }

  .orbit-wrap{
    position:relative;
    width:min(720px, 90vw);
    height:280px;
    margin-bottom:50px;
  }
  .orbit-svg{ position:absolute; inset:0; width:100%; height:100%; }
  .orbit-path{
    fill:none;
    stroke:rgba(154,163,196,0.3);
    stroke-width:1.5;
    stroke-dasharray:5 8;
  }

  .earth, .moon{
    position:absolute;
    border-radius:50%;
  }
  .earth{
    width:78px; height:78px;
    left:0; bottom:6px;
    background:
      radial-gradient(circle at 35% 30%, #7fd0ff, transparent 55%),
      radial-gradient(circle at 65% 70%, #2a6fb0, transparent 60%),
      linear-gradient(135deg, #3fa9f5, #1a4f8f);
    box-shadow:0 0 40px rgba(63,169,245,.55), inset -8px -8px 18px rgba(0,0,0,.35);
  }
  .moon{
    width:36px; height:36px;
    right:6px; top:14px;
    background:radial-gradient(circle at 35% 30%, #f5f6fa, transparent 55%),
      linear-gradient(135deg, #d9dbe4, #9a9dab);
    box-shadow:0 0 20px rgba(217,219,228,.4), inset -5px -5px 10px rgba(0,0,0,.3);
  }
  .moon::after, .moon::before{
    content:''; position:absolute; border-radius:50%;
    background:rgba(0,0,0,0.12);
  }
  .moon::after{ width:8px; height:8px; top:8px; left:6px; }
  .moon::before{ width:5px; height:5px; top:20px; left:20px; }

  .rocket{
    position:absolute;
    width:34px; height:34px;
    left:0; top:0;
    transform-origin:center;
    offset-path: path('M 40 250 C 180 40, 420 340, 660 40');
    offset-rotate:auto;
    animation:fly 6s cubic-bezier(.45,0,.4,1) infinite;
    filter:drop-shadow(0 0 8px rgba(255,215,106,.7));
  }
  .rocket svg{ width:100%; height:100%; display:block; }
  @keyframes fly{
    0%{ offset-distance:0%; opacity:0; }
    6%{ opacity:1; }
    92%{ opacity:1; }
    100%{ offset-distance:100%; opacity:0; }
  }
  .rocket .flame{
    animation:flicker .12s linear infinite alternate;
  }
  @keyframes flicker{ 0%{ opacity:.6; } 100%{ opacity:1; } }

  .start-btn{
    position:relative;
    font-family:'Orbitron', sans-serif;
    font-size:16px; font-weight:700; letter-spacing:.15em;
    color:var(--void);
    background:linear-gradient(120deg, var(--starlight), #ffb84d);
    border:none; border-radius:999px;
    padding:18px 52px;
    cursor:pointer;
    box-shadow:0 0 25px rgba(255,215,106,.55), 0 8px 30px rgba(0,0,0,.4);
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .start-btn:hover{
    transform:translateY(-3px) scale(1.03);
    box-shadow:0 0 40px rgba(255,215,106,.8), 0 10px 34px rgba(0,0,0,.45);
  }
  .start-btn:active{ transform:translateY(0) scale(.98); }

  .hint{
    margin-top:18px;
    font-size:12.5px;
    color:var(--text-dim);
    letter-spacing:.03em;
  }

  @media (max-width:820px){
    .layout{ flex-direction:column; }
    .mission-nav{
      width:100%; flex-direction:row; overflow-x:auto;
      padding:14px 10px; border-right:none;
      border-bottom:1px solid rgba(138,110,240,0.25);
    }
    .nav-title{ display:none; }
    .unit-list{ flex-direction:row; gap:4px; }
    .unit-item{ flex-direction:column; gap:6px; padding:8px 14px; font-size:12px; border-left:none; border-bottom:3px solid transparent; white-space:nowrap; }
    .unit-item:hover, .unit-item.active{ border-left:none; border-bottom-color:var(--starlight); }
    .nav-footer{ display:none; }
    main{ padding:40px 16px 60px; }
  }

  @media (prefers-reduced-motion: reduce){
    .star, .shooting-star, .rocket, .start-btn{ animation:none !important; }
  }
</style>
</head>
<body>

<div id="stars"></div>

<div class="layout">

  <nav class="mission-nav">
    <div class="nav-title">MISSION CONTROL<span>단원 선택</span></div>
    <ul class="unit-list" id="unitList">
      <li class="unit-item active"><span class="num">1</span>힘과 운동</li>
      <li class="unit-item"><span class="num">2</span>기체의 성질</li>
      <li class="unit-item"><span class="num">3</span>물질의 상태변화</li>
      <li class="unit-item"><span class="num">4</span>식물과 에너지</li>
      <li class="unit-item"><span class="num">5</span>동물과 에너지</li>
      <li class="unit-item"><span class="num">6</span>물질의 특성</li>
      <li class="unit-item"><span class="num">7</span>수권과 해수의 순환</li>
      <li class="unit-item"><span class="num">8</span>열과 우리 생활</li>
    </ul>
    <div class="nav-footer"><b>아화중학교</b><br>2학년 1반 박제민</div>
  </nav>

  <main>
    <div class="badge">SCIENCE MISSION LOG</div>
    <h1>아화중학교 2-1 박제민의<br>과학 탐사 우주선</h1>
    <p class="sub">지구에서 달까지, 오늘도 새로운 단원으로 발사 준비 완료</p>

    <div class="orbit-wrap">
      <svg class="orbit-svg" viewBox="0 0 700 380" preserveAspectRatio="xMidYMid meet">
        <path class="orbit-path" d="M 40 250 C 180 40, 420 340, 660 40"/>
      </svg>
      <div class="earth"></div>
      <div class="moon"></div>
      <div class="rocket">
        <svg viewBox="0 0 64 64">
          <g class="flame">
            <ellipse cx="32" cy="54" rx="6" ry="12" fill="#ff8a3d"/>
            <ellipse cx="32" cy="52" rx="3.4" ry="7" fill="#ffd76a"/>
          </g>
          <path d="M32 4 C42 14 44 30 40 44 L24 44 C20 30 22 14 32 4 Z" fill="#eef1fb"/>
          <path d="M32 4 C42 14 44 30 40 44 L32 44 Z" fill="#c7ccdd"/>
          <circle cx="32" cy="24" r="6" fill="#3fa9f5" stroke="#eef1fb" stroke-width="2"/>
          <path d="M24 34 L12 46 L22 44 Z" fill="#8a6ef0"/>
          <path d="M40 34 L52 46 L42 44 Z" fill="#6c4fd6"/>
        </svg>
      </div>
    </div>

    <button class="start-btn" id="startBtn">START MISSION</button>
    <div class="hint">좌측 메뉴에서 단원을 고른 뒤 START 버튼을 눌러 탐사를 시작하세요</div>
  </main>

</div>

<script>
  const starField = document.getElementById('stars');
  const STAR_COUNT = 160;
  for(let i=0;i<STAR_COUNT;i++){
    const s = document.createElement('div');
    s.className = 'star';
    const size = (Math.random()*2 + 0.6).toFixed(1);
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    s.style.top = Math.random()*100 + '%';
    s.style.left = Math.random()*100 + '%';
    s.style.animationDuration = (Math.random()*3 + 1.8) + 's';
    s.style.animationDelay = (Math.random()*4) + 's';
    starField.appendChild(s);
  }
  for(let i=0;i<3;i++){
    const sh = document.createElement('div');
    sh.className = 'shooting-star';
    sh.style.top = (Math.random()*40 + 5) + '%';
    sh.style.left = (Math.random()*50 + 30) + '%';
    sh.style.animationDelay = (i*3.5 + Math.random()*2) + 's';
    starField.appendChild(sh);
  }

  const units = document.querySelectorAll('.unit-item');
  units.forEach(item=>{
    item.addEventListener('click', ()=>{
      units.forEach(u=>u.classList.remove('active'));
      item.classList.add('active');
    });
  });

  document.getElementById('startBtn').addEventListener('click', ()=>{
    const active = document.querySelector('.unit-item.active');
    const unitName = active ? active.textContent.trim() : '1단원';
    alert('🚀 발사 준비 완료!\n' + unitName + ' 탐사를 시작합니다.');
  });
</script>

</body>
</html>
