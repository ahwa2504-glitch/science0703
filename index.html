<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아화중학교 박제민</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:'Pretendard', sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
}

/* 배경 */
.background{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
}

/* 공룡 이모지 */
.dino{
    position:absolute;
    font-size:90px;
    opacity:0.08;
    animation:float 12s infinite ease-in-out;
}

.d1{top:10%;left:8%;}
.d2{top:65%;left:15%;animation-delay:2s;}
.d3{top:25%;right:10%;animation-delay:4s;}
.d4{bottom:10%;right:20%;animation-delay:6s;}
.d5{top:45%;left:45%;animation-delay:8s;}

@keyframes float{
    0%,100%{
        transform:translateY(0) rotate(0deg);
    }
    50%{
        transform:translateY(-30px) rotate(8deg);
    }
}

/* 카드 */
.card{
    position:relative;
    z-index:10;
    padding:60px 90px;
    border-radius:25px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    box-shadow:0 10px 35px rgba(0,0,0,0.35);
    text-align:center;
}

h1{
    color:white;
    font-size:60px;
    letter-spacing:3px;
    text-shadow:0 0 15px #38bdf8;
}

p{
    color:#cbd5e1;
    margin-top:18px;
    font-size:22px;
}
</style>

</head>
<body>

<div class="background">
    <div class="dino d1">🦖</div>
    <div class="dino d2">🦕</div>
    <div class="dino d3">🦖</div>
    <div class="dino d4">🦕</div>
    <div class="dino d5">🦖</div>
</div>

<div class="card">
    <h1>아화중학교 박제민</h1>
    <p>🦖 Dinosaur Theme 🦕</p>
</div>

</body>
</html>
